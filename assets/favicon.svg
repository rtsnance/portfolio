<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .paper { fill: #FCF7EC; }
    .accent { fill: #D06334; }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #14162E; }
      .accent { fill: #E8C877; }
    }
  </style>
  <!-- split circle — the site's theme-dot mark: paper upper-left, accent lower-right on a 135° diagonal -->
  <circle cx="16" cy="16" r="15" class="paper"/>
  <path class="accent" d="M5.4 26.6 A15 15 0 0 0 26.6 5.4 Z"/>
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#00000022" stroke-width="1"/>
</svg>
